<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="./output.css" rel="stylesheet">
</head>
<body>
<div class="flex min-h-screen items-center justify-center bg-gray-100 p-4">
  <div class="w-full max-w-sm rounded-xl border border-gray-100 bg-white p-8 shadow-md">
    
    <h2 class="mb-6 text-xl font-bold text-gray-900">Welcome to Jayjay Login</h2>
    
    <form class="space-y-4">
      <div>
        <label for="username" class="mb-1 block text-sm font-semibold text-blue-600">Username</label>
        <input 
          type="text" 
          id="username" 
          placeholder="username" 
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm placeholder-gray-400 outline-none transition-colors duration-200 hover:border-blue-500 focus:border-blue-600 focus:ring-1 focus:ring-blue-600"
        />
      </div>
      
      <div>
        <label for="password" class="mb-1 block text-sm font-semibold text-blue-600">Password</label>
        <input 
          type="password" 
          id="password" 
          placeholder="&bull;&bull;&bull;&bull;&bull;&bull;" 
          class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm placeholder-gray-400 outline-none transition-colors duration-200 hover:border-blue-500 focus:border-blue-600 focus:ring-1 focus:ring-blue-600"
        />
      </div>
      
      <div class="pt-2">
        <button 
          type="submit" 
          class="w-full rounded-md bg-blue-600 py-2.5 text-sm font-semibold text-white shadow-sm transition-colors duration-200 hover:bg-blue-700 active:bg-blue-800 focus:outline-none"
        >
          Login
        </button>
      </div>
    </form>
    
  </div>
</div>
</body>
